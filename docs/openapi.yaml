openapi: 3.0.3
info:
  title: CMS Backend API
  version: 1.0.0
  description: OpenAPI documentation for the Laravel CMS backend covering authentication, users, roles, permissions, dashboard, files, notifications, activity logs, and security settings.
servers:
  - url: /api
tags:
  - name: Auth
  - name: Profile
  - name: Dashboard
  - name: Users
  - name: Roles
  - name: Permissions
  - name: Notifications
  - name: Files
  - name: Activity Logs
  - name: Security Settings
security:
  - bearerAuth: []
paths:
  /v1/auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Authenticate a user and issue a Sanctum token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
        '403':
          description: Account is inactive
  /v1/auth/2fa/challenge:
    post:
      tags: [Auth]
      security: []
      summary: Complete 2FA challenge after login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorChallengeRequest'
      responses:
        '200':
          description: Login successful after 2FA
  /v1/auth/forgot-password:
    post:
      tags: [Auth]
      security: []
      summary: Send a password reset link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Reset link sent
  /v1/auth/reset-password:
    post:
      tags: [Auth]
      security: []
      summary: Reset a password using a token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successfully
  /v1/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current access token
      responses:
        '200':
          description: Logout completed
  /v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh the current access token
      responses:
        '200':
          description: Token refreshed
  /v1/auth/me:
    get:
      tags: [Auth]
      summary: Get the current authenticated user
      responses:
        '200':
          description: Current user returned
  /v1/auth/change-password:
    post:
      tags: [Auth]
      summary: Change the authenticated user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed successfully
  /v1/dashboard/overview:
    get:
      tags: [Dashboard]
      summary: Retrieve dashboard summary metrics
      responses:
        '200':
          description: Dashboard overview returned
  /v1/profile:
    get:
      tags: [Profile]
      summary: Retrieve the current user's profile
      responses:
        '200':
          description: Profile returned
    put:
      tags: [Profile]
      summary: Update the current user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated
  /v1/profile/change-password:
    post:
      tags: [Profile]
      summary: Change the current user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed successfully
  /v1/profile/avatar:
    post:
      tags: [Profile]
      summary: Upload a profile avatar
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [avatar]
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        '200':
          description: Avatar uploaded successfully
  /v1/notifications:
    get:
      tags: [Notifications]
      summary: List notifications for the current user
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: per_page
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Notifications returned
  /v1/notifications/unread-count:
    get:
      tags: [Notifications]
      summary: Get unread notification count
      responses:
        '200':
          description: Count returned
  /v1/notifications/{notification}/read:
    patch:
      tags: [Notifications]
      summary: Mark a notification as read
      parameters:
        - $ref: '#/components/parameters/NotificationId'
      responses:
        '200':
          description: Notification marked as read
  /v1/notifications/read-all:
    patch:
      tags: [Notifications]
      summary: Mark all notifications as read
      responses:
        '200':
          description: All notifications marked as read
  /v1/files/images:
    post:
      tags: [Files]
      summary: Upload an image file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                directory:
                  type: string
      responses:
        '201':
          description: Image uploaded successfully
  /v1/files/documents:
    post:
      tags: [Files]
      summary: Upload a document file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [document]
              properties:
                document:
                  type: string
                  format: binary
                directory:
                  type: string
      responses:
        '201':
          description: Document uploaded successfully
  /v1/users:
    get:
      tags: [Users]
      summary: List users
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: role_id
          in: query
          schema:
            type: integer
        - name: per_page
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Users returned
    post:
      tags: [Users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreUserRequest'
      responses:
        '201':
          description: User created
  /v1/users/{user}:
    get:
      tags: [Users]
      summary: Get a user by id
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User returned
    put:
      tags: [Users]
      summary: Update a user
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
    delete:
      tags: [Users]
      summary: Delete a user
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User deleted
  /v1/users/{user}/status:
    patch:
      tags: [Users]
      summary: Activate or deactivate a user
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserStatusRequest'
      responses:
        '200':
          description: User status updated
  /v1/users/{user}/assign-role:
    patch:
      tags: [Users]
      summary: Assign roles to a user
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignUserRoleRequest'
      responses:
        '200':
          description: Roles assigned
  /v1/roles:
    get:
      tags: [Roles]
      summary: List roles
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: per_page
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Roles returned
    post:
      tags: [Roles]
      summary: Create a role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreRoleRequest'
      responses:
        '201':
          description: Role created
  /v1/roles/{role}:
    get:
      tags: [Roles]
      summary: Get a role by id
      parameters:
        - $ref: '#/components/parameters/RoleId'
      responses:
        '200':
          description: Role returned
    put:
      tags: [Roles]
      summary: Update a role
      parameters:
        - $ref: '#/components/parameters/RoleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        '200':
          description: Role updated
    delete:
      tags: [Roles]
      summary: Delete a role
      parameters:
        - $ref: '#/components/parameters/RoleId'
      responses:
        '200':
          description: Role deleted
  /v1/roles/{role}/permissions:
    patch:
      tags: [Roles]
      summary: Sync permissions for a role
      parameters:
        - $ref: '#/components/parameters/RoleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncRolePermissionsRequest'
      responses:
        '200':
          description: Permissions synced
  /v1/permissions:
    get:
      tags: [Permissions]
      summary: List permissions
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: per_page
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Permissions returned
  /v1/security-settings:
    get:
      tags: [Security Settings]
      summary: Get security settings
      responses:
        '200':
          description: Security settings returned
    put:
      tags: [Security Settings]
      summary: Update security settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSecuritySettingRequest'
      responses:
        '200':
          description: Security settings updated
  /v1/security-settings/2fa/setup:
    get:
      tags: [Security Settings]
      summary: Generate a 2FA setup payload
      responses:
        '200':
          description: 2FA setup generated
  /v1/security-settings/2fa/confirm:
    post:
      tags: [Security Settings]
      summary: Confirm 2FA setup using a code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorConfirmRequest'
      responses:
        '200':
          description: 2FA confirmed
  /v1/security-settings/2fa/disable:
    post:
      tags: [Security Settings]
      summary: Disable 2FA for the admin account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorDisableRequest'
      responses:
        '200':
          description: 2FA disabled
  /v1/activity-logs:
    get:
      tags: [Activity Logs]
      summary: List activity logs
      parameters:
        - name: event
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
        - name: module
          in: query
          schema:
            type: string
        - name: subject_type
          in: query
          schema:
            type: string
        - name: per_page
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Activity logs returned
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
  parameters:
    UserId:
      name: user
      in: path
      required: true
      schema:
        type: integer
    RoleId:
      name: role
      in: path
      required: true
      schema:
        type: integer
    NotificationId:
      name: notification
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          nullable: true
        errors:
          nullable: true
    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        last_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        role_id:
          type: integer
          nullable: true
        role_ids:
          type: array
          items:
            type: integer
        avatar_path:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        is_active:
          type: boolean
        status:
          type: string
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Role:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        guard_name:
          type: string
        permissions:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Permission:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        module:
          type: string
        guard_name:
          type: string
    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        data:
          type: object
        read_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
    FileUpload:
      type: object
      properties:
        disk:
          type: string
        path:
          type: string
        url:
          type: string
        original_name:
          type: string
        mime_type:
          type: string
        size:
          type: integer
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            token:
              type: string
            access_token:
              type: string
            token_type:
              type: string
            requires_2fa:
              type: boolean
            user:
              $ref: '#/components/schemas/User'
        errors:
          nullable: true
    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    ResetPasswordRequest:
      type: object
      required: [email, token, password]
      properties:
        email:
          type: string
          format: email
        token:
          type: string
        password:
          type: string
        password_confirmation:
          type: string
    ChangePasswordRequest:
      type: object
      required: [current_password, password]
      properties:
        current_password:
          type: string
        password:
          type: string
        password_confirmation:
          type: string
    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
    TwoFactorChallengeRequest:
      type: object
      required: [temporary_token, code]
      properties:
        temporary_token:
          type: string
        code:
          type: string
    StoreUserRequest:
      type: object
      required: [name, email, password, status]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        password_confirmation:
          type: string
        role_id:
          type: integer
          nullable: true
        role_ids:
          type: array
          items:
            type: integer
        status:
          type: string
          enum: [active, inactive]
    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        password_confirmation:
          type: string
        role_id:
          type: integer
          nullable: true
        role_ids:
          type: array
          items:
            type: integer
        status:
          type: string
          enum: [active, inactive]
    AssignUserRoleRequest:
      type: object
      properties:
        role_id:
          type: integer
          nullable: true
        role_ids:
          type: array
          items:
            type: integer
    UpdateUserStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [active, inactive]
        is_active:
          type: boolean
    StoreRoleRequest:
      type: object
      required: [name, permissions]
      properties:
        name:
          type: string
        permissions:
          type: array
          items:
            type: string
    UpdateRoleRequest:
      type: object
      required: [name, permissions]
      properties:
        name:
          type: string
        permissions:
          type: array
          items:
            type: string
    SyncRolePermissionsRequest:
      type: object
      required: [permissions]
      properties:
        permissions:
          type: array
          items:
            type: string
    UpdateSecuritySettingRequest:
      type: object
      required: [admin_2fa_enabled]
      properties:
        admin_2fa_enabled:
          type: boolean
    TwoFactorConfirmRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
    TwoFactorDisableRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
